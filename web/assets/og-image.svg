<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D3B13"/>
      <stop offset="60%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dots pattern -->
  <g opacity="0.06" fill="#fff">
    <circle cx="120" cy="100" r="3"/>
    <circle cx="320" cy="180" r="2"/>
    <circle cx="900" cy="120" r="3"/>
    <circle cx="1080" cy="280" r="2"/>
    <circle cx="200" cy="450" r="3"/>
    <circle cx="780" cy="520" r="2"/>
    <circle cx="1050" cy="540" r="3"/>
    <circle cx="450" cy="350" r="2"/>
    <circle cx="650" cy="250" r="3"/>
  </g>

  <!-- Brand mark (compass) -->
  <g transform="translate(80, 80)">
    <circle cx="50" cy="50" r="50" fill="rgba(255,255,255,0.15)"/>
    <circle cx="50" cy="50" r="34" stroke="#fff" stroke-width="3" fill="none"/>
    <polygon points="68 32 60 60 32 68 40 40" fill="#fff"/>
  </g>
  <text x="200" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" fill="#fff">HalalNomad</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="80" font-weight="800" fill="#fff" letter-spacing="-2">Halal food,</text>
  <text x="80" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="80" font-weight="800" fill="#fff" letter-spacing="-2">anywhere you travel.</text>

  <!-- Sub line -->
  <text x="80" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="rgba(255,255,255,0.8)">Verified by travellers · Built for Asia first · 13 cities at launch</text>

  <!-- URL footer -->
  <text x="80" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="600" fill="#F9A825" letter-spacing="1">halalnomad.travel</text>
</svg>
