# Supabase CLI project config
# Docs: https://supabase.com/docs/guides/cli/config
# Only fields actually used by this project are set. The `project_id` is
# the Supabase project ref — found in the dashboard URL.

project_id = "aytvorjaetitthzuijkv"

[functions.send-push]
# Cron-driven internal function. JWT gateway disabled because pg_cron uses
# the new sb_secret_* keys (not JWT format). The function itself uses its
# auto-injected SUPABASE_SERVICE_ROLE_KEY env for DB access — no privilege
# escalation possible from the gateway. Worst case if URL leaks: someone
# manually triggers a queue drain (notifications get sent slightly sooner).
verify_jwt = false
